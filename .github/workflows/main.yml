name: Build and Push to GHCR

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./back
          push: true
          tags: ghcr.io/joseale8git/ejercicio2-back:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front
          push: true
          tags: ghcr.io/joseale8git/ejercicio2-front:latest