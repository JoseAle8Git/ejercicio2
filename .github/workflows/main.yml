name: CI/CD Pipeline - Build and Push

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACK: ${{ github.repository }}-back
  IMAGE_NAME_FRONT: ${{ github.repository }}-front

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build y Push del BACKEND
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./back
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACK }}:latest

      # Build y Push del FRONTEND
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./front
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONT }}:latest