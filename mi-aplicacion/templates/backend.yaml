{{- if .Values.backend.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mi-aplicacion.fullname" . }}-backend
  labels:
    app.kubernetes.io/component: backend
    {{- include "mi-aplicacion.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
      {{- include "mi-aplicacion.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: backend
        {{- include "mi-aplicacion.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}-backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.targetPort }}
              protocol: TCP
          env:
            # Aquí es donde ocurre la magia de la conexión con Postgres
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: "{{ .Values.postgresql.auth.username }}"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "{{ .Values.postgresql.auth.password }}"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mi-aplicacion.fullname" . }}-backend
  labels:
    app.kubernetes.io/component: backend
    {{- include "mi-aplicacion.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: backend
    {{- include "mi-aplicacion.selectorLabels" . | nindent 4 }}
{{- end }}